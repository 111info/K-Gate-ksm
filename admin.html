<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>K-Gate | 管理設定</title>
    <style>
        :root {
            --admin-header: #333f48; /* 重厚感のあるグレー */
            --sidebar-bg: #f4f4f4;
            --border: #dcdcdc;
            --accent: #004b87;
            --danger: #d11a2a;
        }

        body {
            font-family: "Meiryo", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #333;
        }

        header {
            background: var(--admin-header);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container { display: flex; flex: 1; overflow: hidden; }

        /* 左メニュー */
        nav {
            width: 220px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
        }

        .menu-item {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid #e0e0e0;
        }
        .menu-item:hover { background: #e9e9e9; }
        .menu-item.active { background: white; font-weight: bold; color: var(--accent); border-left: 4px solid var(--accent); }

        /* メインエリア */
        main { flex: 1; padding: 30px; overflow-y: auto; background: white; }

        .section-title {
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 25px;
            font-size: 1.2rem;
        }

        /* フォーム類 */
        .card {
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 4px;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 3px;
            box-sizing: border-box;
        }

        /* アップロードプレビュー */
        .upload-area {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
        }
        #img-preview {
            width: 60px; height: 60px;
            border: 1px solid #ddd;
            border-radius: 12px;
            object-fit: contain;
            background: #fff;
        }

        /* ボタン */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-save { background: var(--accent); color: white; }
        .btn-del { background: #eee; color: var(--danger); font-size: 0.8rem; }

        /* テーブル */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: left; }
        th { background: #f9f9f9; }

        .initial-lock-msg {
            color: var(--danger);
            font-weight: bold;
            padding: 10px;
            background: #fff0f0;
            border: 1px solid var(--danger);
        }
    </style>
</head>
<body>

<header>
    <span>K-Gate システム管理</span>
    <a href="index.html" style="color: #ccc; text-decoration: none; font-size: 0.8rem;">ポータル画面を表示</a>
</header>

<div class="container">
    <nav>
        <div class="menu-item active" onclick="showTab('apps')">アプリリンク管理</div>
        <div class="menu-item" onclick="showTab('news')">お知らせ投稿</div>
        <div class="menu-item" onclick="showTab('accounts')">アカウント・役職管理</div>
    </nav>

    <main>
        <section id="tab-apps">
            <h2 class="section-title">アプリリンク設定</h2>
            <div class="card">
                <div class="form-group">
                    <label>アプリ名</label>
                    <input type="text" id="app-name" placeholder="例：勤怠管理">
                </div>
                <div class="form-group">
                    <label>URL</label>
                    <input type="url" id="app-url" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>アイコン画像アップロード</label>
                    <div class="upload-area">
                        <input type="file" id="app-file" accept="image/*" onchange="previewImage(this)">
                        <img id="img-preview" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
                    </div>
                </div>
                <button class="btn btn-save" onclick="saveApp()">この内容で登録</button>
            </div>

            <table>
                <thead>
                    <tr><th>アイコン</th><th>アプリ名</th><th>操作</th></tr>
                </thead>
                <tbody id="app-list-body"></tbody>
            </table>
        </section>

        <section id="tab-accounts" style="display:none;">
            <h2 class="section-title">アカウント管理</h2>
            <div id="initial-status-area" class="form-group"></div>
            
            <div class="card">
                <h3>新規アカウント追加</h3>
                <div class="form-group"><label>ユーザーID</label><input type="text" id="user-id"></div>
                <div class="form-group"><label>パスワード</label><input type="password" id="user-pw"></div>
                <div class="form-group"><label>氏名</label><input type="text" id="user-name"></div>
                <div class="form-group">
                    <label>役職</label>
                    <select id="user-role">
                        <option value="admin">管理者 (No.1)</option>
                        <option value="staff">一般社員</option>
                    </select>
                </div>
                <button class="btn btn-save" onclick="saveAccount()">アカウントを作成</button>
            </div>
        </section>
        
        <section id="tab-news" style="display:none;">
            <h2 class="section-title">お知らせ投稿</h2>
            <div class="card">
                <p>※全体・個別放送の選択機能を実装予定</p>
            </div>
        </section>
    </main>
</div>

<script>
    let appImageData = "";

    // タブ切り替え
    function showTab(tabName) {
        document.querySelectorAll('main section').forEach(s => s.style.display = 'none');
        document.getElementById('tab-' + tabName).style.display = 'block';
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    // 画像プレビュー & Base64変換
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                appImageData = e.target.result;
                document.getElementById('img-preview').src = appImageData;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // アプリ保存
    function saveApp() {
        const name = document.getElementById('app-name').value;
        const url = document.getElementById('app-url').value;
        if(!name || !url) return alert("入力してください");

        const apps = JSON.parse(localStorage.getItem('kgate_apps')) || [];
        apps.push({ id: Date.now(), name, url, img: appImageData });
        localStorage.setItem('kgate_apps', JSON.stringify(apps));
        
        alert("登録しました");
        location.reload();
    }

    // リスト表示
    function renderApps() {
        const apps = JSON.parse(localStorage.getItem('kgate_apps')) || [];
        const body = document.getElementById('app-list-body');
        body.innerHTML = apps.map(app => `
            <tr>
                <td><img src="${app.img}" style="width:30px; height:30px; border-radius:6px;"></td>
                <td>${app.name}</td>
                <td><button class="btn btn-del" onclick="deleteApp(${app.id})">削除</button></td>
            </tr>
        `).join('');
    }

    function deleteApp(id) {
        let apps = JSON.parse(localStorage.getItem('kgate_apps')) || [];
        apps = apps.filter(a => a.id !== id);
        localStorage.setItem('kgate_apps', JSON.stringify(apps));
        renderApps();
    }

    // 初期アカウント制御の表示
    function checkInitialStatus() {
        const isLocked = localStorage.getItem('kgate_initial_locked') === 'true';
        const area = document.getElementById('initial-status-area');
        if(isLocked) {
            area.innerHTML = `
                <div class="initial-lock-msg">
                    ⚠️ 初期アカウントは現在ロックされています（404エラー状態）
                    <button class="btn btn-save" style="margin-left:10px;" onclick="unlockInitial()">解除する</button>
                </div>`;
        }
    }

    function unlockInitial() {
        localStorage.removeItem('kgate_initial_locked');
        alert("初期アカウントのロックを解除しました。");
        location.reload();
    }

    window.onload = () => {
        renderApps();
        checkInitialStatus();
    };
</script>
</body>
</html>
