<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>K-Gate | 管理設定</title>
    <style>
        :root {
            --admin-header: #333f48;
            --sidebar-bg: #f8f9fa;
            --white: #ffffff;
            --border: #dcdcdc;
            --accent: #004b87;
            --danger: #d11a2a;
            --radius: 12px;
        }

        body {
            font-family: "Meiryo", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #eee;
        }

        header {
            background: var(--admin-header);
            color: white;
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* 左メニュー */
        nav {
            width: 240px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
        }

        .menu-item {
            padding: 18px 25px;
            cursor: pointer;
            border-bottom: 1px solid #e0e0e0;
            transition: 0.2s;
            font-size: 0.95rem;
        }
        .menu-item:hover { background: #e9ecef; }
        .menu-item.active { 
            background: white; 
            font-weight: bold; 
            color: var(--accent); 
            border-left: 6px solid var(--accent); 
        }

        /* メインエリア */
        main { flex: 1; padding: 30px; overflow-y: auto; background: #fff; }

        .section-title {
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 25px;
            font-size: 1.3rem;
        }

        .card {
            border: 1px solid var(--border);
            padding: 25px;
            margin-bottom: 25px;
            border-radius: var(--radius);
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; color: #555; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        /* 画像アップロード */
        .upload-row { display: flex; align-items: center; gap: 20px; margin-top: 10px; }
        #img-preview {
            width: 70px; height: 70px;
            border: 1px solid #ddd;
            border-radius: 18px;
            object-fit: contain;
            background: #f9f9f9;
        }

        /* ボタン */
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-save { background: var(--accent); color: white; }
        .btn-save:hover { opacity: 0.9; }
        .btn-del { background: #fdf2f2; color: var(--danger); border: 1px solid #f8d7da; padding: 5px 10px; font-size: 0.8rem; }

        /* グリッドレイアウト */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #f8f9fa; color: #666; font-size: 0.85rem; }

        /* 404ロック表示 */
        .lock-banner {
            background: #fff5f5;
            border: 1px solid #feb2b2;
            color: #c53030;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<header>
    <span>K-Gate システム管理</span>
    <a href="index.html" style="color: #adb5bd; text-decoration: none; font-size: 0.85rem;">ポータル画面へ戻る</a>
</header>

<div class="main-container">
    <nav>
        <div class="menu-item active" onclick="showTab('apps')">📱 アプリリンク管理</div>
        <div class="menu-item" onclick="showTab('accounts')">👤 アカウント・役職</div>
        <div class="menu-item" onclick="showTab('news')">📢 お知らせ投稿</div>
    </nav>

    <main>
        <section id="tab-apps">
            <h2 class="section-title">アプリリンク設定</h2>
            <div class="card">
                <div class="form-group">
                    <label>アプリ名</label>
                    <input type="text" id="app-name" placeholder="勤怠管理システムなど">
                </div>
                <div class="form-group">
                    <label>URL</label>
                    <input type="url" id="app-url" placeholder="https://example.com">
                </div>
                <div class="form-group">
                    <label>アイコン（アップロード）</label>
                    <div class="upload-row">
                        <input type="file" accept="image/*" onchange="handleFile(this)">
                        <img id="img-preview" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7">
                    </div>
                </div>
                <button class="btn btn-save" onclick="saveApp()">新規アプリを登録</button>
            </div>

            <div class="card">
                <h3>登録済みリスト</h3>
                <table>
                    <thead><tr><th>アイコン</th><th>アプリ名</th><th>操作</th></tr></thead>
                    <tbody id="app-list"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-accounts" style="display:none;">
            <h2 class="section-title">アカウント・役職管理</h2>
            
            <div id="lock-status-area"></div>

            <div class="admin-grid">
                <div class="card">
                    <h3>役職マスター設定</h3>
                    <div class="form-group">
                        <label>新しい役職を追加</label>
                        <input type="text" id="new-role-name" placeholder="課長、エンジニアなど">
                        <button class="btn btn-save" style="margin-top:10px; width:100%;" onclick="addRole()">追加</button>
                    </div>
                    <ul id="role-list" style="list-style:none; padding:0; font-size:0.9rem;"></ul>
                </div>

                <div class="card">
                    <h3>ユーザー登録</h3>
                    <div class="form-group"><label>ID</label><input type="text" id="u-id"></div>
                    <div class="form-group"><label>氏名</label><input type="text" id="u-name"></div>
                    <div class="form-group">
                        <label>役職</label>
                        <select id="u-role-select"></select>
                    </div>
                    <button class="btn btn-save" style="width:100%;" onclick="saveUser()">アカウント作成</button>
                </div>
            </div>

            <div class="card">
                <h3>登録ユーザー一覧</h3>
                <table>
                    <thead><tr><th>ID</th><th>氏名</th><th>役職</th><th>操作</th></tr></thead>
                    <tbody id="user-list"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-news" style="display:none;">
            <h2 class="section-title">お知らせ投稿</h2>
            <div class="card">機能拡張準備中...</div>
        </section>
    </main>
</div>

<script>
    // --- 共有データ処理 ---
    let appImgBase64 = "";

    function showTab(name) {
        document.querySelectorAll('main section').forEach(s => s.style.display = 'none');
        document.getElementById('tab-' + name).style.display = 'block';
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    // --- アプリ管理 ---
    function handleFile(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                // 容量節約のため簡易リサイズ
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 100; canvas.height = 100;
                    canvas.getContext('2d').drawImage(img, 0, 0, 100, 100);
                    appImgBase64 = canvas.toDataURL('image/png');
                    document.getElementById('img-preview').src = appImgBase64;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function saveApp() {
        const name = document.getElementById('app-name').value;
        const url = document.getElementById('app-url').value;
        if(!name || !url) return alert("入力が足りません");
        const apps = JSON.parse(localStorage.getItem('kgate_apps') || '[]');
        apps.push({ id: Date.now(), name, url, img: appImgBase64 });
        localStorage.setItem('kgate_apps', JSON.stringify(apps));
        alert("登録しました");
        location.reload();
    }

    function renderApps() {
        const apps = JSON.parse(localStorage.getItem('kgate_apps') || '[]');
        document.getElementById('app-list').innerHTML = apps.map(a => `
            <tr>
                <td><img src="${a.img}" style="width:30px; border-radius:8px;"></td>
                <td>${a.name}</td>
                <td><button class="btn-del" onclick="deleteItem('kgate_apps', ${a.id})">削除</button></td>
            </tr>
        `).join('');
    }

    // --- 役職・ユーザー管理 ---
    let roles = JSON.parse(localStorage.getItem('kgate_roles') || '["管理者", "一般"]');
    let users = JSON.parse(localStorage.getItem('kgate_users') || '[]');

    function addRole() {
        const val = document.getElementById('new-role-name').value;
        if(!val || roles.includes(val)) return;
        roles.push(val);
        localStorage.setItem('kgate_roles', JSON.stringify(roles));
        renderRoles();
        document.getElementById('new-role-name').value = "";
    }

    function renderRoles() {
        document.getElementById('role-list').innerHTML = roles.map(r => `
            <li style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;">
                ${r} <span style="color:red;cursor:pointer" onclick="delRole('${r}')">×</span>
            </li>`).join('');
        document.getElementById('u-role-select').innerHTML = roles.map(r => `<option value="${r}">${r}</option>`).join('');
    }

    function delRole(r) {
        roles = roles.filter(x => x !== r);
        localStorage.setItem('kgate_roles', JSON.stringify(roles));
        renderRoles();
    }

    function saveUser() {
        const id = document.getElementById('u-id').value;
        const name = document.getElementById('u-name').value;
        const role = document.getElementById('u-role-select').value;
        if(!id || !name) return alert("IDと氏名を入力してください");
        users.push({ id, name, role, internalId: Date.now() });
        localStorage.setItem('kgate_users', JSON.stringify(users));
        renderUsers();
    }

    function renderUsers() {
        document.getElementById('user-list').innerHTML = users.map(u => `
            <tr>
                <td>${u.id}</td>
                <td>${u.name}</td>
                <td>${u.role}</td>
                <td><button class="btn-del" onclick="deleteItem('kgate_users', ${u.internalId})">削除</button></td>
            </tr>`).join('');
    }

    // --- 404ロック解除ロジック ---
    function checkLock() {
        const isLocked = localStorage.getItem('kgate_initial_locked') === 'true';
        const area = document.getElementById('lock-status-area');
        if(isLocked) {
            area.innerHTML = `
                <div class="lock-banner">
                    <span>⚠️ 現在、初期アカウントはログアウト後に <b>404エラー</b> を吐く設定（ロック状態）になっています。</span>
                    <button class="btn btn-save" onclick="unlock()">ロックを解除</button>
                </div>`;
        }
    }

    function unlock() {
        localStorage.removeItem('kgate_initial_locked');
        alert("ポータルのロックを解除しました。初期アカウントで再アクセス可能です。");
        location.reload();
    }

    // 削除共通
    function deleteItem(key, id) {
        let data = JSON.parse(localStorage.getItem(key) || '[]');
        const target = key === 'kgate_apps' ? 'id' : 'internalId';
        data = data.filter(item => item[target] !== id);
        localStorage.setItem(key, JSON.stringify(data));
        location.reload();
    }

    window.onload = () => {
        renderApps();
        renderRoles();
        renderUsers();
        checkLock();
    };
</script>

</body>
</html>
