<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>K-Gate | システム管理</title>
    <style>
        :root {
            --header-bg: #333f48;
            --sidebar-bg: #f8f9fa;
            --accent: #004b87;
            --danger: #d11a2a;
            --border: #dcdcdc;
            --radius: 12px;
        }

        body {
            font-family: "Meiryo", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f0f2f5;
        }

        header {
            background: var(--header-bg);
            color: white;
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* 左サイドメニュー */
        nav {
            width: 240px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
        }

        .menu-item {
            padding: 18px 25px;
            cursor: pointer;
            border-bottom: 1px solid #e0e0e0;
            transition: 0.2s;
        }
        .menu-item:hover { background: #e9ecef; }
        .menu-item.active { 
            background: white; 
            font-weight: bold; 
            color: var(--accent); 
            border-left: 6px solid var(--accent); 
        }

        /* メインコンテンツ */
        main { flex: 1; padding: 30px; overflow-y: auto; background: #fff; }

        .card {
            border: 1px solid var(--border);
            padding: 25px;
            margin-bottom: 25px;
            border-radius: var(--radius);
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; color: #555; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        /* プレビュー画像 */
        .pre-img {
            width: 60px; height: 60px;
            border-radius: 15px;
            object-fit: contain;
            background: #f9f9f9;
            border: 1px solid #eee;
            margin-top: 10px;
        }

        /* ボタン */
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--accent); color: white; width: 100%; }
        .btn-del { background: #fff0f0; color: var(--danger); border: 1px solid #ffdada; padding: 5px 10px; font-size: 0.8rem; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; font-size: 0.9rem; }
        th { background: #f8f9fa; color: #666; }

        .lock-notice {
            background: #fff5f5;
            border: 1px solid #feb2b2;
            color: #c53030;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<header>
    <span>K-Gate Portal | 管理システム</span>
    <a href="index.html" style="color: #adb5bd; text-decoration: none; font-size: 0.85rem;">ポータル画面を表示</a>
</header>

<div class="main-container">
    <nav>
        <div class="menu-item active" onclick="showTab('apps')">📱 アプリ管理</div>
        <div class="menu-item" onclick="showTab('accounts')">👥 役職・アカウント</div>
    </nav>

    <main>
        <section id="tab-apps">
            <h2 style="border-left: 5px solid var(--accent); padding-left: 10px;">アプリリンク設定</h2>
            <div class="card">
                <div class="form-group"><label>アプリ名</label><input type="text" id="app-name"></div>
                <div class="form-group"><label>URL</label><input type="url" id="app-url"></div>
                <div class="form-group">
                    <label>アイコン（自動圧縮）</label>
                    <input type="file" accept="image/*" onchange="handleImage(this)">
                    <img id="app-preview" class="pre-img" src="">
                </div>
                <button class="btn btn-save" onclick="saveApp()">アプリを登録</button>
            </div>
            <div class="card">
                <table>
                    <thead><tr><th>Icon</th><th>Name</th><th>Action</th></tr></thead>
                    <tbody id="list-apps"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-accounts" style="display:none;">
            <h2 style="border-left: 5px solid var(--accent); padding-left: 10px;">役職・アカウント管理</h2>
            <div id="lock-area"></div>

            <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px;">
                <div class="card">
                    <h3>役職マスター</h3>
                    <input type="text" id="new-role" placeholder="例：課長">
                    <button class="btn btn-save" style="margin-top:10px;" onclick="addRole()">追加</button>
                    <ul id="list-roles" style="margin-top:15px; font-size:0.9rem;"></ul>
                </div>
                <div class="card">
                    <h3>新規ユーザー</h3>
                    <div class="form-group"><label>ID</label><input type="text" id="u-id"></div>
                    <div class="form-group"><label>氏名</label><input type="text" id="u-name"></div>
                    <div class="form-group"><label>役職</label><select id="u-role-select"></select></div>
                    <button class="btn btn-save" onclick="saveUser()">作成</button>
                </div>
            </div>

            <div class="card">
                <h3>登録ユーザー一覧</h3>
                <table>
                    <thead><tr><th>ID</th><th>氏名</th><th>役職</th><th>操作</th></tr></thead>
                    <tbody id="list-users"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script>
    let currentAppImg = "";

    function showTab(name) {
        document.querySelectorAll('main section').forEach(s => s.style.display = 'none');
        document.getElementById('tab-' + name).style.display = 'block';
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    // 画像の超軽量圧縮 (iPad対策)
    function handleImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 100; canvas.height = 100;
                    canvas.getContext('2d').drawImage(img, 0, 0, 100, 100);
                    currentAppImg = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('app-preview').src = currentAppImg;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // 保存・削除ロジック
    function saveApp() {
        const n = document.getElementById('app-name').value;
        const u = document.getElementById('app-url').value;
        if(!n || !u) return alert("入力不足です");
        const apps = JSON.parse(localStorage.getItem('kgate_apps') || '[]');
        apps.push({ id: Date.now(), name: n, url: u, img: currentAppImg });
        localStorage.setItem('kgate_apps', JSON.stringify(apps));
        location.reload();
    }

    function addRole() {
        const r = document.getElementById('new-role').value;
        const roles = JSON.parse(localStorage.getItem('kgate_roles') || '["管理者", "一般"]');
        if(!r || roles.includes(r)) return;
        roles.push(r);
        localStorage.setItem('kgate_roles', JSON.stringify(roles));
        render();
    }

    function saveUser() {
        const id = document.getElementById('u-id').value;
        const name = document.getElementById('u-name').value;
        const role = document.getElementById('u-role-select').value;
        if(!id || !name) return;
        const users = JSON.parse(localStorage.getItem('kgate_users') || '[]');
        users.push({ id, name, role, internalId: Date.now() });
        localStorage.setItem('kgate_users', JSON.stringify(users));
        render();
    }

    function render() {
        // アプリ表示
        const apps = JSON.parse(localStorage.getItem('kgate_apps') || '[]');
        document.getElementById('list-apps').innerHTML = apps.map(a => `<tr><td><img src="${a.img}" width="30" style="border-radius:6px;"></td><td>${a.name}</td><td><button class="btn-del" onclick="delItem('kgate_apps',${a.id})">削除</button></td></tr>`).join('');
        
        // 役職・ユーザー表示
        const roles = JSON.parse(localStorage.getItem('kgate_roles') || '["管理者", "一般"]');
        document.getElementById('list-roles').innerHTML = roles.map(r => `<li>${r}</li>`).join('');
        document.getElementById('u-role-select').innerHTML = roles.map(r => `<option value="${r}">${r}</option>`).join('');
        
        const users = JSON.parse(localStorage.getItem('kgate_users') || '[]');
        document.getElementById('list-users').innerHTML = users.map(u => `<tr><td>${u.id}</td><td>${u.name}</td><td>${u.role}</td><td><button class="btn-del" onclick="delItem('kgate_users',${u.internalId})">削除</button></td></tr>`).join('');

        // ロック表示
        if(localStorage.getItem('kgate_initial_locked') === 'true') {
            document.getElementById('lock-area').innerHTML = `<div class="lock-notice"><span>⚠️ ポータルが404ロック中です</span><button class="btn" style="background:#fff" onclick="localStorage.removeItem('kgate_initial_locked');location.reload();">解除する</button></div>`;
        }
    }

    function delItem(key, id) {
        let data = JSON.parse(localStorage.getItem(key));
        const field = key === 'kgate_apps' ? 'id' : 'internalId';
        localStorage.setItem(key, JSON.stringify(data.filter(d => d[field] !== id)));
        render();
    }

    window.onload = render;
</script>
</body>
</html>
